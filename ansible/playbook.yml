---
- name: Deploy python application
  hosts: all
  become: yes
  vars:
    app_name: python
    app_dir: /opt/app
    app_port: 8000
    app_user: ubuntu

  handlers:
    - name: restart app
      systemd:
        name: app
        state: restarted
        daemon_reload: yes

    - name: restart nginx
      service:
        name: nginx
        state: restarted

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Python and dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - nginx
          - git
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Pull app from GitHub repository
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: "{{ app_user }}"

    - name: Check if requirements.txt exists in repo
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: requirements_stat

    - name: Write default requirements.txt if not present
      copy:
        content: |
          fastapi
          uvicorn
          gunicorn
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: not requirements_stat.stat.exists

    - name: Check if main.py exists in repo
      stat:
        path: "{{ app_dir }}/main.py"
      register: main_py_stat

    - name: Write default main.py if not present
      copy:
        content: |
          from fastapi import FastAPI

          app = FastAPI()

          @app.get("/")
          def root():
              return {"status": "ok", "app": "python"}
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: not main_py_stat.stat.exists

    - name: Create Python virtualenv and install requirements
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv

    - name: Set app directory ownership
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    - name: Create systemd service for app
      copy:
        content: |
          [Unit]
          Description=Python App - {{ app_name }}
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart={{ app_dir }}/venv/bin/gunicorn -w 4 -b 0.0.0.0:{{ app_port }} main:app
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/app.service
        mode: "0644"
      notify: restart app

    - name: Enable and start app service
      systemd:
        name: app
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Configure nginx reverse proxy
      copy:
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:{{ app_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60s;
                  proxy_connect_timeout 60s;
              }
          }
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"
      notify: restart nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes